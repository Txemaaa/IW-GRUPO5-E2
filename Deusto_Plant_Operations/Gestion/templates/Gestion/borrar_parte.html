<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <title>Eliminar Parte de Trabajo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'Css/Plantilla_unificada.css' %}">
    <link rel="stylesheet" href="{% static 'Css/Css_borrar_parte.css' %}">
</head>

<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container d-flex flex-column align-items-center">
            <a class="navbar-brand" href="/">Planta Deusto</a>
            <ul class="navbar-nav d-flex flex-row gap-3">
                <li class="nav-item"><a class="nav-link" href="/turnos/">Turnos</a></li>
                <li class="nav-item"><a class="nav-link" href="/empleados/">Empleados</a></li>
                <li class="nav-item"><a class="nav-link" href="/partes/">Partes de Trabajo</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h2>¿Seguro que quieres eliminar el parte {{ parte.codigo }}?</h2>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'lista_partes' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
    <footer class="footer">
    <p>Deusto Plant Operations S.L. | Grupo 5 | David Orive, Juan María Díaz, Diego Suárez</p>
    </footer>
</body>
</html>
