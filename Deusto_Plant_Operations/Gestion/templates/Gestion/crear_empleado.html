<!DOCTYPE html>
<html lang="es">
<head>
    <title>Nuevo Empleado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'lista_turnos' %}">Planta Deusto</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'lista_turnos' %}">Turnos</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'lista_empleados' %}">Empleados</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'lista_partes' %}">Partes de Trabajo</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2>Nuevo Empleado</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{% url 'lista_empleados' %}">Cancelar</a>
        </form>
    </div>
</body>
</html>
