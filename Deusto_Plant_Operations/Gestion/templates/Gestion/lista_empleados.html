{% extends 'Gestion/index.html' %}

{% block content %}

<h2 class="mb-3">Lista de Empleados</h2>

<a href="{% url 'crear_empleado' %}" class="btn btn-primary mb-3">+ Crear empleado</a>

<ul class="list-group">
    {% for empleado in empleados %}
    <li class="list-group-item">{{ empleado.nombre }} {{ empleado.apellidos }}</li>
    {% empty %}
    <li class="list-group-item">No hay empleados registrados.</li>
    {% endfor %}
</ul>

{% endblock %}
